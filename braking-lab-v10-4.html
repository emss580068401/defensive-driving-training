<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煞停距離與規避實驗室 V10.4.1 | 模組化升級版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap"
        rel="stylesheet">

    <script>
        (function () {
            function updateMobile() {
                if (window.innerWidth < 1080) document.documentElement.classList.add('is-mobile');
                else document.documentElement.classList.remove('is-mobile');
            }
            updateMobile();
            window.addEventListener('resize', updateMobile);
        })();
    </script>

    <style>
        :root {
            --bg: #020617;
            --sidebar: rgba(15, 23, 42, 0.95);
            --sidebar-border: rgba(56, 189, 248, 0.2);
            --accent: #0ea5e9;
            --accent-glow: #38bdf8;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text: #f8fafc;
            --glass: backdrop-filter: blur(20px) saturate(180%);
            --grass-sunny: #166534;
            --grass-rainy: #14532d;
            --grass-snowy: #e2e8f0;
            --lane-width: 140px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100%;
            background: #000;
            border: none;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.1), inset 0 0 100px #000;
            position: relative;
        }

        #v10-flash {
            position: absolute;
            inset: 0;
            background: #ef4444;
            opacity: 0;
            pointer-events: none;
            z-index: 3000;
            mix-blend-mode: overlay;
            transition: 0.1s;
        }

        #v10-particles {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1500;
        }

        #glass-crack {
            position: absolute;
            inset: 0;
            z-index: 8000;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none; /* 穿透點擊，取代 display:none */
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }

        #glass-crack.active {
            opacity: 1; /* 移除 display: block */
        }

        .crack-img {
            width: 100%;
            height: 100%;
            background-image: url('assets/cracked-glass.png');
            background-size: cover;
            mix-blend-mode: screen;
            filter: contrast(180%) brightness(150%) blur(0.5px);
        }

        #ambient-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: background 1s;
        }

        aside {
            width: 340px;
            flex-shrink: 0;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: var(--sidebar) !important;
            backdrop-filter: blur(20px) saturate(180%);
            border-right: 1px solid var(--sidebar-border);
            z-index: 10000;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        main {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .hud-header {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .hud-header h1 {
            font-size: 1.3rem;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            font-family: 'Orbitron';
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem;
            border-radius: 16px;
            text-align: center;
            position: relative;
            box-shadow: inset 0 0 10px #000;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #ddd;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
        }

        .stat-val {
            font-size: 2.4rem;
            font-weight: 900;
            font-family: 'Orbitron';
            line-height: 1;
            color: #fff;
            transition: color 0.3s;
        }

        .night-shade {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 80%, transparent 200px, rgba(0, 0, 0, 0.9) 500px);
            z-index: 5000;
            pointer-events: none;
            display: none;
        }

        .roadV10 {
            width: 480px;
            height: 100%;
            background: #1e293b;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-left: 15px solid #334155;
            border-right: 15px solid #334155;
            z-index: 10;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .road-texture {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.15"/></svg>');
            mix-blend-mode: overlay;
            opacity: 0.5;
        }

        #v10-marks {
            position: absolute;
            left: 50%;
            top: -100px;
            width: 100%;
            height: 200%;
            transform: translateX(-50%);
        }

        .lane-mark {
            position: absolute;
            left: 50%;
            width: 8px;
            height: 180px;
            background: rgba(255, 255, 255, 0.5);
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .scenery-layer {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            overflow: hidden;
        }

        #scene-l,
        #scene-r {
            flex: 1;
            height: 100%;
            position: relative;
            transition: background 1s;
        }

        #scene-l {
            background: linear-gradient(90deg, #000, var(--grass-sunny));
        }

        #scene-r {
            background: linear-gradient(-90deg, #000, var(--grass-sunny));
        }

        .prop {
            position: absolute;
            background-size: cover;
            z-index: 10;
            filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.8));
            font-size: 60px !important;
        }

        .t-cab {
            position: absolute;
            top: 0;
            width: 100%;
            height: 90px;
            background: linear-gradient(180deg, #dc2626, #991b1b);
            border-radius: 12px 12px 4px 4px;
            box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.3);
            z-index: 3;
        }

        .t-glass {
            position: absolute;
            top: 12px;
            left: 10px;
            right: 10px;
            height: 45px;
            background: linear-gradient(160deg, #0f172a, #1e293b 50%, #020617);
            border-radius: 6px;
            border: 2px solid #334155;
        }

        .t-siren-bar {
            position: absolute;
            top: 65px;
            left: 5px;
            right: 5px;
            height: 12px;
            background: #1e293b;
            border-radius: 4px;
            display: flex;
            overflow: hidden;
            border: 1.5px solid #000;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
            z-index: 4;
        }

        .s-led {
            flex: 1;
            height: 100%;
            background: #450a0a;
        }

        .s-led.red.active {
            background: #ef4444;
            box-shadow: 0 0 30px #ef4444;
            animation: s-flash-r 0.15s infinite;
        }

        .s-led.blue.active {
            background: #3b82f6;
            box-shadow: 0 0 30px #3b82f6;
            animation: s-flash-b 0.15s infinite;
            animation-delay: 0.075s;
        }

        @keyframes s-flash-r {

            0%,
            40% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0.3;
            }
        }

        @keyframes s-flash-b {

            0%,
            40% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0.3;
            }
        }

        .t-body {
            position: absolute;
            top: 88px;
            width: 100%;
            height: 190px;
            background: linear-gradient(90deg, #7f1d1d, #b91c1c 20%, #b91c1c 80%, #7f1d1d);
            border-radius: 0 0 8px 8px;
            border-top: 2px solid #450a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .t-shutter {
            width: 35px !important;
            height: 100px !important;
            background: repeating-linear-gradient(180deg, #1e293b, #1e293b 3px, #0f172a 4px) !important;
            border: 2px solid #000 !important;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }

        .t-ladder {
            position: absolute;
            right: 8px;
            top: 10px;
            width: 20px;
            height: 160px;
            background: rgba(200, 200, 200, 0.9);
            border: 2px solid #475569;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            z-index: 5;
        }

        .t-rung {
            width: 100%;
            height: 3px;
            background: #334155;
        }

        .t-chevron-area {
            position: absolute !important;
            bottom: 0 !important;
            width: 100% !important;
            height: 30px !important;
            background: repeating-linear-gradient(45deg, #fbbf24, #fbbf24 8px, #dc2626 8px, #dc2626 16px) !important;
            border-top: 2px solid #000 !important;
        }

        .t-wheel {
            position: absolute;
            width: 16px;
            height: 30px;
            background: #020617;
            border-radius: 4px;
            z-index: 1;
            border: 1.5px solid #334155;
            box-shadow: 0 3px 6px #000;
        }

        .w-fl {
            top: 15px;
            left: -4px;
        }

        .w-fr {
            top: 15px;
            right: -4px;
        }

        .w-rl {
            bottom: 25px;
            left: -5px;
        }

        .w-rr {
            bottom: 25px;
            right: -5px;
        }

        .t-tail-l,
        .t-tail-r {
            position: absolute;
            bottom: 5px;
            width: 12px;
            height: 12px;
            background: #78350f;
            border-radius: 2px;
            border: 1px solid #000;
            z-index: 5;
        }

        .t-tail-l {
            left: 8px;
        }

        .t-tail-r {
            right: 8px;
        }

        .t-tail-l.active,
        .t-tail-r.active {
            background: #fbbf24;
            box-shadow: 0 0 40px #fbbf24;
        }


        .v10-main-btn {
            background: linear-gradient(135deg, #fff, #cbd5e1);
            color: #020617;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-weight: 900;
            font-size: 1.25rem;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 0 #94a3b8, 0 10px 20px rgba(0, 0, 0, 0.4);
            font-family: 'Noto Sans TC';
            letter-spacing: 2px;
            transition: 0.1s;
        }

        .v10-main-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #94a3b8;
        }

        .ctrl-group {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .ctrl-label {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .w-btn {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(30, 41, 59, 0.4);
            color: #94a3b8;
            text-align: left;
            cursor: pointer;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.85rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .w-btn:last-child {
            margin-bottom: 0;
        }

        .w-btn.active {
            background: rgba(14, 165, 233, 0.15);
            color: #fff;
            border: 1px solid var(--accent);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
        }

        #result-v10 {
            position: absolute;
            inset: 0;
            background: transparent;
            z-index: 9000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
        }

        .rush-left {
            animation: rush-gen 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .rush-right {
            animation: rush-gen 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes rush-gen {
            0% {
                transform: translateX(var(--start-x));
            }

            100% {
                transform: translateX(var(--target-x));
            }
        }

        #truck-v10 {
            transition: transform 0.1s, left 0.15s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: center 80%;
        }

        .sway {
            animation: chassis-sway 0.5s infinite alternate ease-in-out;
        }

        @keyframes chassis-sway {
            0% {
                transform: rotate(-0.5deg) translateX(-1px);
            }

            100% {
                transform: rotate(0.5deg) translateX(1px);
            }
        }

        .nose-dive {
            transform: scaleY(1.05) translateY(-5px) !important;
            filter: drop-shadow(0 40px 50px rgba(0, 0, 0, 0.9));
        }

        .exhaust-p {
            position: absolute;
            background: rgba(100, 100, 100, 0.4);
            border-radius: 50%;
            filter: blur(4px);
            animation: e-anim 0.8s forwards;
            pointer-events: none;
        }

        @keyframes e-anim {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            100% {
                transform: scale(3) translate(-20px, 50px);
                opacity: 0;
            }
        }

        .skidV10 {
            position: absolute;
            width: 34px;
            background: rgba(10, 10, 10, 0.4);
            border-radius: 4px;
            filter: blur(2px);
            pointer-events: none;
        }

        .crash-flash {
            animation: flash-red 0.5s ease-out;
        }

        @keyframes flash-red {
            0% {
                background: rgba(239, 68, 68, 0.8);
            }

            100% {
                background: transparent;
            }
        }

        /* 英雄榜增強樣式 */
        .fame-list {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 5px;
            max-height: 130px;
            overflow-y: auto;
            flex: 1;
        }

        .fame-list::-webkit-scrollbar {
            width: 4px;
        }

        .fame-list::-webkit-scrollbar-thumb {
            background: var(--sidebar-border);
            border-radius: 10px;
        }

        .fame-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-family: 'Noto Sans TC';
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 2px;
        }

        .fame-item:nth-child(1) {
            background: rgba(234, 179, 8, 0.05);
            border-left: 3px solid #facc15;
        }

        .fame-item:nth-child(1) span:first-child {
            color: #facc15;
            font-weight: 900;
        }

        .fame-streak {
            font-family: 'Orbitron';
            font-weight: 900;
            color: var(--accent);
        }

        .fame-input-group {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .fame-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* --- 手機用戶動態佈局覆寫 (基於 html.is-mobile) --- */
        html.is-mobile .app-shell {
            flex-direction: column !important;
            display: flex !important;
            overflow: hidden !important;
        }

        html.is-mobile aside {
            width: 100% !important;
            height: auto !important;
            min-height: 80px !important;
            flex-direction: row !important;
            justify-content: space-evenly !important;
            align-items: center !important;
            padding: 5px 15px !important;
            background: var(--sidebar) !important;
            border-right: none !important;
            border-bottom: 2px solid var(--accent) !important;
            position: relative !important;
            flex: 0 0 auto !important;
            z-index: 9999 !important;
        }

        html.is-mobile .hud-header,
        html.is-mobile #hero-board-v10,
        html.is-mobile .fame-title,
        html.is-mobile #fame-name-input,
        html.is-mobile #v10-btn-save,
        html.is-mobile .ctrl-label,
        html.is-mobile .fame-list,
        html.is-mobile #v10-btn-main {
            display: none !important;
        }

        html.is-mobile .stat-box {
            flex: 1 !important;
            margin: 0 4px !important;
            padding: 5px !important;
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(56, 189, 248, 0.2) !important;
            border-radius: 12px !important;
        }

        html.is-mobile .stat-val {
            font-size: 1.15rem !important;
        }

        html.is-mobile .stat-label {
            font-size: 0.55rem !important;
            opacity: 0.8;
        }

        html.is-mobile main {
            width: 100% !important;
            height: 0 !important;
            flex: 1 1 auto !important;
            display: flex !important;
            position: relative !important;
            padding: 0 !important;
        }

        html.is-mobile .roadV10 {
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            border-left: 6px solid #334155 !important;
            border-right: 6px solid #334155 !important;
        }

        html.is-mobile #truck-v10 {
            transform: scale(0.78) !important;
            transform-origin: bottom center;
        }

        html.is-mobile .prop {
            font-size: 48px !important;
            transform: scale(0.78) !important;
        }
    </style>
</head>

<body>
    <div id="ambient-layer"></div>
    <div id="glass-crack">
        <div class="crack-img"></div>
    </div>

    <div class="app-shell">
        <aside>
            <div class="hud-header">
                <h1>煞停實驗室</h1>
                <span id="v10-ver-tag"
                    style="font-size: 0.6rem; color: var(--accent); border: 1px solid var(--accent); padding: 2px 4px; border-radius: 4px;">V10.4.1
                    MODULAR</span>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <div class="stat-box">
                    <div class="stat-label">時速 (KPH)</div>
                    <div class="stat-val" id="v10-val-speed">0</div>
                </div>
                <div class="stat-box" style="border-color: var(--warning);">
                    <div class="stat-label" style="color: var(--warning);">戰術連勝</div>
                    <div class="stat-val" id="v10-val-streak" style="color: var(--warning);">0</div>
                </div>
            </div>

            <div class="stat-box">
                <div class="stat-label">反應延時 (REACTION)</div>
                <div class="stat-val" id="v10-val-ms">0.00</div>
            </div>

            <div class="ctrl-group" style="display: none;">
                <div class="ctrl-label"><i class="fas fa-mountain"></i> 環境感知 (ENV)</div>
                <button class="w-btn active e-btn" onclick="setEnv('sunny')"><i class="fas fa-sun"></i> ☀️ 睛天
                    (μ=0.85)</button>
                <button class="w-btn e-btn" onclick="setEnv('rainy')"><i class="fas fa-cloud-showers-heavy"></i> 🌧️ 雨天
                    (μ=0.71)</button>
                <button class="w-btn e-btn" onclick="setEnv('night')"><i class="fas fa-moon"></i> 🌙 夜間
                    (μ=0.75)</button>
            </div>

            <div class="ctrl-group" style="display: none;">
                <div class="ctrl-label"><i class="fas fa-skull-crossbones"></i> 威脅程度 (RISK)</div>
                <button class="w-btn r-btn" onclick="setRisk(3)">🔴 Lv.3 極限預判 (1/3均等版)</button>
            </div>

            <div class="ctrl-label" style="margin-top: 5px;"><i class="fas fa-trophy"></i> 戰術名錄 (FAME)</div>
            <div class="fame-list" id="v10-fame-list"></div>

            <button id="v10-btn-main" class="v10-main-btn" style="margin-top: 5px;">啟動戰術模擬</button>
        </aside>

        <main id="v10-screen">
            <canvas id="v10-particles"></canvas>
            <div id="v10-flash"
                style="position:absolute; inset:0; pointer-events:none; z-index:3000; opacity:0; transition:0.1s;">
            </div>
            <div class="night-shade" id="night-shade"></div>
            <div class="scenery-layer">
                <div id="scene-l"></div>
                <div id="scene-r"></div>
            </div>

            <div class="roadV10" id="road-box">
                <div class="road-texture"></div>
                <div id="road-wet" style="position:absolute; inset:0; background:rgba(255,255,255,0.1); opacity:0;">
                </div>
                <div id="v10-marks"></div>

                <div id="p-zone-v10"
                    style="position:absolute; top:-3000px; width:100%; display:none; justify-content:center; z-index:60;">
                    <div id="p-scaler" style="transition: none;">
                        <div id="p-target" style="font-size:80px; position:relative;">🛑</div>
                    </div>
                </div>

                <div id="fx-layer" style="position:absolute; inset:0; z-index:50;"></div>

                <div id="truck-v10"
                    style="position:absolute; bottom:80px; left:50%; width:70px; height:150px; margin-left:-35px; z-index:100; filter: drop-shadow(0 30px 40px rgba(0,0,0,0.8));">
                    <div class="t-wheel w-fl"></div>
                    <div class="t-wheel w-fr"></div>
                    <div class="t-wheel w-rl"></div>
                    <div class="t-wheel w-rr"></div>

                    <div class="t-cab" style="height: 50px; border-bottom: 2px solid #450a0a;">
                        <div class="t-siren-bar" style="top: 26px;">
                            <div class="s-led red led-bar"></div>
                            <div class="s-led blue led-bar"></div>
                        </div>
                        <div class="t-glass" style="top: 8px; height: 12px;"></div>
                    </div>

                    <div class="t-body" style="height: 100px; top: 50px;">
                        <div style="display:flex; width:85%; justify-content:space-between; margin-top:10px;">
                            <div class="t-shutter" style="height: 50px !important; width: 22px !important;"></div>
                            <div class="t-shutter" style="height: 50px !important; width: 22px !important;"></div>
                        </div>
                        <div class="t-ladder" style="height: 75px;">
                            <div class="t-rung"></div>
                            <div class="t-rung"></div>
                            <div class="t-rung"></div>
                        </div>
                        <div class="t-chevron-area"></div>
                        <div class="t-tail-l"></div>
                        <div class="t-tail-r"></div>
                    </div>
                </div>
            </div>

            <div id="result-v10">
                <div
                    style="background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); padding: 22px; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 90%; max-width: 440px; margin: 0 auto;">
                    <h2 id="v10-res-h" style="font-size:2rem; margin-bottom:15px;">任務完成</h2>
                    <p id="v10-res-p" style="margin-bottom:20px; font-weight:700;"></p>

                    <div id="fame-input-group" class="fame-input-group">
                        <p style="color: var(--warning); font-weight: 700; letter-spacing: 1px;">🎖️ 達成戰鬥紀錄！請登入編號：</p>
                        <input type="text" id="fame-name-input" class="fame-input" maxlength="10" placeholder="戰術官代號">
                        <button class="v10-main-btn" onclick="saveFame()"
                            style="padding:10px; margin-top:5px; font-size:1rem;">存入英雄榜</button>
                    </div>

                    <button id="reset-btn" class="v10-main-btn" onclick="resetV10()"
                        style="margin-top: 15px;">重新開始</button>
                </div>
            </div>
        </main>
    </div>

    <script src="braking-lab.js"></script>
</body>

</html>
